<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/css/user.css}" />
    <title>Dashboard | Xantrex</title>
</head>

<body class="d-flex flex-column min-vh-100 bg-xan-white">

    <!-- Navbar -->
    <nav class="xan-navbar navbar px-4">
        <a class="navbar-brand" th:href="@{/calculator}">xantrex</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
    </nav>

    <div class="container flex-grow-1 py-4">
        <h2 class="text-center mb-4 xan-page-title">Controller Dashboard</h2>

        <div th:if="${isIntern}" class="xan-panel mb-4">
            <h5 class="mb-3 xan-title">Add Controller</h5>
            <form th:action="@{/dashboard/add}" method="post" class="row g-2 align-items-end">
                <div class="col-md-2">
                    <label class="form-label">Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Name" required />
                </div>
                <div class="col-md-2">
                    <label class="form-label">Max VOC (V)</label>
                    <input type="number" step="0.1" name="maxVoc" class="form-control" placeholder="Max VOC (V)"
                        required />
                </div>
                <div class="col-md-2">
                    <label class="form-label">Max Current (A)</label>
                    <input type="number" step="0.1" name="maxCurrent" class="form-control" placeholder="Max Current (A)"
                        required />
                </div>
                <div class="col-md-2">
                    <label class="form-label">Max ISC (A)</label>
                    <input type="number" step="0.1" name="maxIsc" class="form-control" placeholder="Max ISC (A)"
                        required />
                </div>
                <div class="col-md-2">
                    <label class="form-label">Battery Bank</label>
                    <select name="batteryBank" class="form-select" required>
                        <option value="">Battery Bank</option>
                        <option value="12V">12V</option>
                        <option value="24V">24V</option>
                        <option value="36V">36V</option>                                                                     
                        <option value="48V">48V</option>                                                                     
                        <option value="60V">60V</option>  
                    </select>
                </div>
                <div class="col-md-2">                                                                               
                    <label class="form-label">Image URL</label>
                    <input type="text" name="imageUrl" class="form-control" placeholder="Image URL" />               
                </div>                                                                                
                <div class="col-md-2">                                                                               
                    <label class="form-label">Product URL</label>
                    <input type="text" name="productUrl" class="form-control" placeholder="Product URL" />           
                </div>  
                <div class="col-md-2">
                    <button type="submit" class="btn btn-xan w-100">Add</button>
                </div>
            </form>
        </div>

        <div class="xan-panel">
            <h5 class="mb-3 xan-title">Controllers</h5>
            <div class="table-responsive">
                <table class="table xan-table mt-2 mb-0">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Max VOC (V)</th>
                            <th>Max Current (A)</th>
                            <th>Max ISC (A)</th>
                            <th>Battery Bank</th>
                            <th>Image</th>
                            <th>Product URL</th>    
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="controller : ${controllers}">
                            <td th:text="${controller.name}"></td>
                            <td th:text="${controller.maxVoc}"></td>
                            <td th:text="${controller.maxCurrent}"></td>
                            <td th:text="${controller.maxIsc}"></td>
                            <td th:text="${controller.batteryBank}"></td>
                            <td><img th:src="${controller.imageUrl}" width="80" /></td>
                            <td><a th:href="${controller.productUrl}" target="_blank">View</a></td> 
                            <td th:if="${isIntern}">
                                <form th:action="@{/dashboard/delete}" method="post" style="display:inline;">
                                    <input type="hidden" name="id" th:value="${controller.id}" />
                                    <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Footer -->
    <footer class="xan-footer">
    </footer>

</body>

</html>
