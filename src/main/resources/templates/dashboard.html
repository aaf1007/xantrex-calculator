<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <title>Xantrex Dashboard</title>
</head>

<body>

    <nav class="navbar px-4">
        <span class="navbar-brand">Xantrex</span>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-dark btn-sm">Logout</button>
        </form>
    </nav>

    <div class="container mt-4">

        <div th:if="${isIntern}" class="card mb-4 p-4">
            <h5>Add Controller</h5>
            <form th:action="@{/dashboard/add}" method="post" class="row g-2">
                <div class="col-md-2">
                    <input type="text" name="name" class="form-control" placeholder="Name" required />
                </div>
                <div class="col-md-2">
                    <input type="number" step="0.1" name="maxVoc" class="form-control" placeholder="Max VOC (V)"
                        required />
                </div>
                <div class="col-md-2">
                    <input type="number" step="0.1" name="maxCurrent" class="form-control" placeholder="Max Current (A)"
                        required />
                </div>
                <div class="col-md-2">
                    <input type="number" step="0.1" name="maxIsc" class="form-control" placeholder="Max ISC (A)"
                        required />
                </div>
                <div class="col-md-2">
                    <select name="batteryBank" class="form-select" required>
                        <option value="">Battery Bank</option>
                        <option value="12V">12V</option>
                        <option value="24V">24V</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100">Add</button>
                </div>
            </form>
        </div>

        <div class="card p-4">
            <h5>Controllers</h5>
            <table class="table table-striped mt-2">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Max VOC (V)</th>
                        <th>Max Current (A)</th>
                        <th>Max ISC (A)</th>
                        <th>Battery Bank</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="controller : ${controllers}">
                        <td th:text="${controller.name}"></td>
                        <td th:text="${controller.maxVoc}"></td>
                        <td th:text="${controller.maxCurrent}"></td>
                        <td th:text="${controller.maxIsc}"></td>
                        <td th:text="${controller.batteryBank}"></td>
                        <td th:if="${isIntern}">
                            <form th:action="@{/dashboard/delete}" method="post" style="display:inline;">
                                <input type="hidden" name="id" th:value="${controller.id}" />
                                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
