<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Recommendation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<!-- this is basic layout for now, the result card can contain the recommended controller details -->
<body class="bg-light py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <h3 class="mb-4">3. Recommended MPPT Solar Charge Controller:</h3>

                <div class="card p-5 shadow-lg border-0">
                    <img src="/images/placeholder.png" class="img-fluid mb-4" style="max-height: 250px;">

                    <h2 class="fw-bold">Recommended Controller</h2>
                    <p class="text-muted">Total Power: <span th:text="${result.totalPower}"></span> W</p>
                    <a href="#" class="btn btn-dark btn-lg">Buy on Bay Marine Supply</a>

                </div>

                <a th:href="@{/calculator}" class="btn btn-link mt-3 text-decoration-none">← Adjust Specifications</a>
            </div>
        </div>
    </div>

</body>

</html>
