<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/css/user.css}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <title>Xantrex Calculator</title>
  </head>

  <body class="d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="xan-navbar navbar px-4">
      <a class="navbar-brand" th:href="@{/calculator}">xantrex</a>
    </nav>

    <!-- Main -->
    <div class="flex-grow-1 d-flex justify-content-center align-items-center">
      <div class="xan-card form-box">
        <div class="form-slider" id="formSlider">

          <!-- LOGIN FORM -->
          <div class="form-panel">
            <h3 class="mb-3" style="color: #1B3668;">Login</h3>

            <form th:action="@{/login}" method="post">
              <div th:if="${param.registered}" class="alert alert-success py-2 mb-2" role="alert">
                Account created, please log in.
              </div>
              <div th:if="${param.error}" class="alert alert-danger py-2 mb-2" role="alert">
                Invalid email or password.
              </div>

              <input type="email" name="email" class="form-control mb-3" placeholder="Email" required/>
              <div class="input-group mb-3">
                <input type="password" id="loginPassword" name="password" class="form-control" placeholder="Password" required/>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('loginPassword', this)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>

              <button type="submit" class="btn btn-xan w-100">Login</button>
            </form>

            <p class="mt-3 text-center">
              Don't have an account?
              <a href="#" class="xan-link" onclick="showRegister()">Create Account</a>
            </p>
          </div>

          <!-- REGISTER FORM -->
          <div class="form-panel">
            <h3 class="mb-3" style="color: #1B3668;">Create Account</h3>

            <form th:action="@{/register}" method="post">
              <div th:if="${param.registrationError}" class="alert alert-danger py-2 mb-2" role="alert">
                Email already in use.
              </div>

              <input type="email" name="email" class="form-control mb-3" placeholder="Email" required/>
              <div class="input-group mb-3">
                <input type="password" id="registerPassword" name="password" class="form-control" placeholder="Password" required/>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('registerPassword', this)">
                  <i class="bi bi-eye"></i>
                </button>
              </div>

              <button type="submit" class="btn btn-xan w-100">Register</button>
            </form>

            <p class="mt-3 text-center">
              Already have an account?
              <a href="#" class="xan-link" onclick="showLogin()">Login</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="xan-footer">
    </footer>

    <script th:src="@{/js/user.js}"></script>
    <script>
      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
      }
    </script>
    <script>                                                                                        
        if (window.location.search.includes('signup')) showRegister();                                
    </script>   
  </body>

</html>
