<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/css/user.css}"/>
    <title>Xantrex Calculator</title>
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="form-box">
        <div class="form-slider" id="formSlider">

          <!-- LOGIN FORM -->
          <div class="form-panel">
            <h3>Login</h3>

            <form th:action="@{/login}" method="post">
              <div th:if="${param.registered}" class="alert alert-success py-2 mb-2" role="alert">
                Account created, please log in.
              </div>
              <div th:if="${param.error}" class="alert alert-danger py-2 mb-2" role="alert">
                Invalid email or password.
              </div>

              <input type="email" name="email" class="form-control mb-2" placeholder="Email" />
              <input
                type="password"
                name="password"
                class="form-control mb-2"
                placeholder="Password"
              />

              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <p class="mt-3">
              Don't have an account?
              <a href="#" onclick="showRegister()">Create Account</a>
            </p>
          </div>

          <!-- REGISTER FORM -->
          <div class="form-panel">
            <h3>Create Account</h3>

            <form th:action="@{/register}" method="post">
              <div th:if="${param.registrationError}" class="alert alert-danger py-2 mb-2" role="alert">
                Email already in use.
              </div>

              <input type="email" name="email" class="form-control mb-2" placeholder="Email" />
              <input
                type="password"
                name="password"
                class="form-control mb-2"
                placeholder="Password"
              />

              <button type="submit" class="btn btn-success w-100">Register</button>
            </form>

            <p class="mt-3">
              Already have an account?
              <a href="#" onclick="showLogin()">Login</a>
            </p>
          </div>
        </div>
      </div>
    </div>
    <script th:src="@{/js/user.js}"></script>
  </body>

</html>
