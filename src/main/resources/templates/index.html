<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" th:href="@{/css/user.css}"/>
    <title>Xantrex Calculator</title>
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center vh-100"
    >
      <div class="form-box">
        <div class="form-slider" id="formSlider">

          <!-- LOGIN FORM -->
          <div class="form-panel">
            <h3>Login</h3>

            <input class="form-control mb-2" placeholder="Email" />
            <input
              type="password"
              class="form-control mb-2"
              placeholder="Password"
            />

            <button class="btn btn-primary w-100">Login</button>

            <p class="mt-3">
              Don't have an account?
              <a href="#" onclick="showRegister()">Create Account</a>
            </p>
          </div>

          <!-- REGISTER FORM -->
          <div class="form-panel">
            <h3>Create Account</h3>

            <input class="form-control mb-2" placeholder="Name" />
            <input class="form-control mb-2" placeholder="Email" />
            <input
              type="password"
              class="form-control mb-2"
              placeholder="Password"
            />

            <button class="btn btn-success w-100">Register</button>

            <p class="mt-3">
              Already have an account?
              <a href="#" onclick="showLogin()">Login</a>
            </p>
          </div>
        </div>
      </div>
    </div>
    <script th:src="@{/js/user.js}"></script>
  </body>
  
</html>
