spring.application.name=xantrex-calculator

# PostgreSQL Datasource — set DB_URL, DB_USER, DB_PASSWORD env vars for deployment
# Local dev defaults: jdbc:postgresql://localhost:5432/xantrex_db / postgres / postgres
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/xantrex_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update

# Spring Session JDBC
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
